name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: j178/prek-action@v2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: common-repo/setup-common-repo@v1

      - name: Validate configuration
        run: common-repo validate

      - name: Dry-run apply
        run: common-repo apply --dry-run
